<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
    }
    h1 { font-size: 2rem; letter-spacing: 0.3em; color: #4ade80; margin-bottom: 12px; }
    #scoreboard {
      display: flex;
      gap: 40px;
      margin-bottom: 12px;
      font-size: 1rem;
      letter-spacing: 0.1em;
    }
    #scoreboard span { color: #4ade80; font-weight: bold; }
    canvas {
      border: 2px solid #4ade80;
      box-shadow: 0 0 20px #4ade8066;
    }
    #message {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #aaa;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="scoreboard">
    SCORE: <span id="score">0</span>
    &nbsp;&nbsp;BEST: <span id="best">0</span>
  </div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <div id="message">Press SPACE or ENTER to start &nbsp;|&nbsp; Arrow keys or WASD to move</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const msgEl = document.getElementById('message');

    const CELL = 20;
    const COLS = canvas.width / CELL;
    const ROWS = canvas.height / CELL;

    let snake, dir, nextDir, food, score, best, running, gameLoop;

    best = parseInt(localStorage.getItem('snakeBest') || '0');
    bestEl.textContent = best;

    function initGame() {
      snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      scoreEl.textContent = 0;
      placeFood();
      msgEl.textContent = 'Arrow keys or WASD to move  |  P to pause';
    }

    function placeFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function tick() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        return endGame();
      }
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        return endGame();
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem('snakeBest', best);
        }
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      ctx.fillStyle = '#0f0f23';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid dots
      ctx.fillStyle = '#1e1e3a';
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          ctx.fillRect(x * CELL + CELL / 2 - 1, y * CELL + CELL / 2 - 1, 2, 2);
        }
      }

      // Food
      const fx = food.x * CELL + CELL / 2;
      const fy = food.y * CELL + CELL / 2;
      ctx.fillStyle = '#f87171';
      ctx.shadowColor = '#f87171';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(fx, fy, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Snake
      snake.forEach((seg, i) => {
        const t = i / snake.length;
        const green = Math.round(200 - t * 80);
        ctx.fillStyle = i === 0 ? '#4ade80' : `rgb(30, ${green}, 80)`;
        if (i === 0) {
          ctx.shadowColor = '#4ade80';
          ctx.shadowBlur = 12;
        } else {
          ctx.shadowBlur = 0;
        }
        ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);
      });
      ctx.shadowBlur = 0;

      // Eyes on head
      const h = snake[0];
      ctx.fillStyle = '#000';
      const ex = dir.x === 1 ? 13 : dir.x === -1 ? 4 : 6;
      const ey = dir.y === 1 ? 13 : dir.y === -1 ? 4 : 6;
      const ex2 = dir.x !== 0 ? ex : 13;
      ctx.beginPath();
      ctx.arc(h.x * CELL + ex, h.y * CELL + ey, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(h.x * CELL + ex2, h.y * CELL + (dir.x !== 0 ? 13 : ey), 2, 0, Math.PI * 2);
      ctx.fill();
    }

    function endGame() {
      clearInterval(gameLoop);
      running = false;

      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#f87171';
      ctx.font = 'bold 2rem Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
      ctx.fillStyle = '#e0e0e0';
      ctx.font = '1rem Courier New';
      ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + 16);

      msgEl.textContent = 'Press SPACE or ENTER to play again';
    }

    function startGame() {
      if (running) return;
      running = true;
      initGame();
      draw();
      const speed = 120;
      gameLoop = setInterval(tick, speed);
    }

    let paused = false;
    document.addEventListener('keydown', e => {
      const key = e.key;

      if ((key === ' ' || key === 'Enter') && !running) {
        startGame();
        return;
      }

      if (key === 'p' || key === 'P') {
        if (!running) return;
        paused = !paused;
        if (paused) {
          clearInterval(gameLoop);
          msgEl.textContent = 'PAUSED — press P to resume';
        } else {
          gameLoop = setInterval(tick, 120);
          msgEl.textContent = 'Arrow keys or WASD to move  |  P to pause';
        }
        return;
      }

      const dirs = {
        ArrowUp:    { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
        ArrowDown:  { x: 0, y:  1 }, s: { x: 0, y:  1 }, S: { x: 0, y:  1 },
        ArrowLeft:  { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 },  d: { x: 1, y: 0 },  D: { x: 1, y: 0 },
      };
      const d = dirs[key];
      if (d && !(d.x === -dir.x && d.y === -dir.y)) {
        nextDir = d;
        e.preventDefault();
      }
    });

    // Initial screen
    ctx.fillStyle = '#0f0f23';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#4ade80';
    ctx.font = 'bold 1.5rem Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('Press SPACE to Start', canvas.width / 2, canvas.height / 2);
  </script>
</body>
</html>
